name: AI 분석

on:
  workflow_dispatch:
    inputs:
      app_key:
        description: "분석할 앱 키 (필수)"
        required: true
      force:
        description: "true이면 pending_analysis 체크 생략 + 전체 리뷰 기반 분석"
        required: false
        default: "false"

concurrency:
  group: analyze-${{ inputs.app_key }}
  cancel-in-progress: false   # 동시 분석 큐잉 방지 (이미 실행 중이면 대기)

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: AI 분석 실행
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          MASTER_SPREADSHEET_ID: ${{ secrets.MASTER_SPREADSHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APP_KEY: ${{ inputs.app_key }}
          FORCE: ${{ inputs.force }}
        run: python -m backend.main_analyze
