name: 리뷰 수집

on:
  workflow_dispatch:
    inputs:
      app_key:
        description: "수집할 앱 키 (필수)"
        required: true
      mode:
        description: "수집 모드: onboarding (전체) | update (신규만)"
        required: true
        default: "update"
        type: choice
        options:
          - onboarding
          - update

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: 리뷰 수집 실행
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          MASTER_SPREADSHEET_ID: ${{ secrets.MASTER_SPREADSHEET_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
          APP_KEY: ${{ inputs.app_key }}
          MODE: ${{ inputs.mode }}
        run: python -m backend.main_collect

      - name: AI 분석 자동 트리거
        if: success()
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}\n" -X POST \
            -H "Authorization: Bearer $GITHUB_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/analyze.yml/dispatches \
            -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"app_key\":\"${{ inputs.app_key }}\",\"force\":\"false\"}}"
