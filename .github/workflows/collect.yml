name: 리뷰 수집 (daily)

on:
  schedule:
    # 매일 새벽 3시 (KST = UTC+9, 즉 UTC 18:00)
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      target_app_key:
        description: "특정 앱만 처리 (비우면 전체)"
        required: false
        default: ""

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 리뷰 수집 실행
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          MASTER_SPREADSHEET_ID: ${{ secrets.MASTER_SPREADSHEET_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TARGET_APP_KEY: ${{ github.event.inputs.target_app_key }}
        run: python -m backend.main_collect
